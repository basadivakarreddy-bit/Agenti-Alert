<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication | Agenti Alert</title>
    <link rel="stylesheet" href="auth.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Background glows -->
    <div class="bg-glow bg-blue"></div>
    <div class="bg-glow bg-purple"></div>

    <div class="auth-container">
      <div class="auth-brand">
        <div class="logo">A</div>
        <h2>Agenti Alert</h2>
        <p>Step into the future of proactive career growth.</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Log In</button>
          <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div class="auth-bodies">
          <!-- Login Form -->
          <form id="form-login" class="auth-form active" onsubmit="handleAuth(event)">
            <div class="input-group">
              <label>Email Address</label>
              <input type="email" placeholder="agent@example.com" autocomplete="email" required />
            </div>
            <div class="input-group">
              <label>Password</label>
              <input type="password" placeholder="••••••••" autocomplete="current-password" required />
            </div>
            <div class="form-options">
              <label class="remember"><input type="checkbox" /> Remember me</label>
              <a href="#" class="forgot">Forgot Password?</a>
            </div>
            <button type="submit" class="btn-submit">Secure Log In</button>
            
            <div class="divider"><span>OR</span></div>
            <button type="button" class="btn-google" onclick="googleSignIn()">
              <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
              Sign in with Google
            </button>
          </form>

          <!-- Signup Form -->
          <form id="form-signup" class="auth-form" onsubmit="handleAuth(event)">
            <div class="input-group">
              <label>Full Name</label>
              <input type="text" placeholder="John Doe" autocomplete="name" required />
            </div>
            <div class="input-group">
              <label>Email Address</label>
              <input type="email" placeholder="john@example.com" autocomplete="email" required />
            </div>
            <div class="input-group">
              <label>Password</label>
              <input type="password" placeholder="Create a strong password" autocomplete="new-password" required />
            </div>
            <div class="input-group">
              <label>Confirm Password</label>
              <input type="password" placeholder="Verify your password" autocomplete="new-password" required />
            </div>
            <button type="submit" class="btn-submit">Create Account</button>
            
            <div class="divider"><span>OR</span></div>
            <button type="button" class="btn-google" onclick="googleSignIn()">
              <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
              Sign up with Google
            </button>
          </form>
        </div>
      </div>
      
      <a href="index.html" class="back-link">← Return to Landing Page</a>
    </div>

    <script>
      function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('form-' + tab).classList.add('active');
      }

      function handleAuth(e) {
        e.preventDefault();
        const isLogin = e.target.id === 'form-login';
        
        if (isLogin) {
          const email = e.target.querySelector('input[type="email"]').value;
          const password = e.target.querySelector('input[type="password"]').value;
          const registeredEmail = localStorage.getItem('agenti_email');
          const registeredPassword = localStorage.getItem('agenti_password');
          
          if (!registeredEmail) {
            alert('No account found! Please sign up first.');
            return;
          }
          if (email !== registeredEmail || password !== registeredPassword) {
            alert('Invalid email or password! Please try again.');
            return;
          }
        } else {
          const email = e.target.querySelector('input[type="email"]').value;
          const passInputs = e.target.querySelectorAll('input[type="password"]');
          const password = passInputs[0].value;
          const confirmPassword = passInputs[1].value;
          
          if (password !== confirmPassword) {
            alert("Passwords don't match! Please try again.");
            return;
          }
          localStorage.setItem('agenti_email', email);
          localStorage.setItem('agenti_password', password);
        }

        const btn = e.target.querySelector('button[type="submit"]');
        btn.textContent = 'Authenticating...';
        btn.style.opacity = '0.7';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
      }
    </script>

    <!-- Firebase Modular SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

      // TODO: Replace with your Firebase project config
      const firebaseConfig = {
        apiKey: "AIzaSy_YOUR_API_KEY_HERE",
        authDomain: "your-project-id.firebaseapp.com",
        projectId: "your-project-id",
        storageBucket: "your-project-id.appspot.com",
        messagingSenderId: "1234567890",
        appId: "1:1234567890:web:abcdef123456"
      };

      let auth, provider;
      try {
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        provider = new GoogleAuthProvider();
      } catch (err) {
        console.warn("Firebase config placeholder — insert real keys to enable Google Sign-in.");
      }

      window.googleSignIn = async () => {
        if (!auth) {
          alert("Firebase is not configured yet. Please add your Firebase project keys to auth.html.");
          return;
        }
        try {
          const result = await signInWithPopup(auth, provider);
          localStorage.setItem('agenti_email', result.user.email);
          window.location.href = 'dashboard.html';
        } catch (error) {
          alert("Google Sign-In failed: " + error.message);
        }
      };
    </script>
  </body>
</html>
